<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BookBoard - 読書管理</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2A1810">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon.svg">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F5F0E8; --surface: #FFFFFF; --card: #FFFDF8;
      --border: #E8E0D0; --accent: #C8973F; --accent2: #8B6040;
      --green: #2E7D32; --blue: #1565C0; --red: #C62828;
      --text: #2A1810; --text2: #6B5B4E; --text3: #A09080;
      --want: #E3F2FD; --want-border: #90CAF9; --want-accent: #1565C0;
      --reading: #FFF3E0; --reading-border: #FFB74D; --reading-accent: #E65100;
      --done: #E8F5E9; --done-border: #81C784; --done-accent: #2E7D32;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', -apple-system, sans-serif; min-height: 100vh; }

    /* Header */
    .header { background: #2A1810; color: #F7F0E3; padding: 0.8rem 1.5rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.1rem; font-weight: 800; letter-spacing: 0.08em; } .logo span { color: var(--accent); }
    .header-actions { display: flex; gap: 0.5rem; }
    .btn { padding: 0.4rem 0.9rem; border-radius: 0.4rem; border: none; cursor: pointer; font-size: 0.78rem; font-weight: 600; transition: all 0.15s; }
    .btn-primary { background: var(--accent); color: #fff; } .btn-primary:hover { opacity: 0.85; }
    .btn-outline { background: none; border: 1px solid rgba(255,255,255,0.2); color: #F7F0E3; } .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
    .btn-sm { padding: 0.3rem 0.7rem; font-size: 0.72rem; }
    .btn-accent { background: var(--accent); color: #fff; }
    .btn-ghost { background: none; border: 1px solid var(--border); color: var(--text2); } .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    /* Nav tabs */
    .nav-tabs { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; padding: 0 1.5rem; }
    .nav-tab { padding: 0.7rem 1.2rem; font-size: 0.85rem; color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; background: none; border-top: none; border-left: none; border-right: none; font-weight: 600; }
    .nav-tab:hover { color: var(--text); } .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .page { display: none; } .page.active { display: block; }

    /* Board */
    .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; padding: 1.5rem; min-height: calc(100vh - 110px); }
    .column { background: var(--surface); border-radius: 0.8rem; border: 1px solid var(--border); display: flex; flex-direction: column; min-height: 300px; }
    .column-header { padding: 0.8rem 1rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; border-radius: 0.8rem 0.8rem 0 0; }
    .column-title { font-size: 0.85rem; font-weight: 700; display: flex; align-items: center; gap: 0.4rem; }
    .column-count { font-size: 0.68rem; background: var(--border); color: var(--text2); padding: 0.1rem 0.5rem; border-radius: 1rem; }
    .col-want .column-header { background: var(--want); } .col-want .column-title { color: var(--want-accent); }
    .col-reading .column-header { background: var(--reading); } .col-reading .column-title { color: var(--reading-accent); }
    .col-done .column-header { background: var(--done); } .col-done .column-title { color: var(--done-accent); }
    .column-body { padding: 0.6rem; flex: 1; overflow-y: auto; min-height: 100px; }
    .column-body.drag-over { background: rgba(200,151,63,0.05); }

    /* Book card */
    .book-card { background: var(--card); border: 1px solid var(--border); border-radius: 0.5rem; padding: 0.7rem; margin-bottom: 0.5rem; cursor: grab; transition: box-shadow 0.15s, transform 0.15s; display: flex; gap: 0.6rem; }
    .book-card:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.08); transform: translateY(-1px); }
    .book-card.dragging { opacity: 0.5; }
    .book-cover { width: 40px; height: 56px; background: var(--border); border-radius: 0.2rem; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 1rem; overflow: hidden; }
    .book-cover img { width: 100%; height: 100%; object-fit: cover; }
    .book-card-info { flex: 1; min-width: 0; }
    .book-card-title { font-size: 0.82rem; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .book-card-author { font-size: 0.7rem; color: var(--text3); margin-top: 0.1rem; }
    .book-card-tags { display: flex; gap: 0.25rem; flex-wrap: wrap; margin-top: 0.3rem; }
    .tag { font-size: 0.6rem; padding: 0.08rem 0.4rem; border-radius: 0.8rem; font-weight: 600; }
    .tag-genre { background: rgba(200,151,63,0.15); color: var(--accent); }
    .tag-award { background: rgba(46,125,50,0.12); color: var(--green); }
    .book-card-rating { display: flex; gap: 1px; margin-top: 0.25rem; }
    .star { font-size: 0.65rem; color: var(--border); } .star.filled { color: var(--accent); }

    /* Modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(42,24,16,0.5); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border-radius: 0.8rem; padding: 1.5rem; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; position: relative; }
    .modal-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 1rem; }
    .modal-close { position: absolute; top: 0.8rem; right: 1rem; background: none; border: none; font-size: 1.3rem; cursor: pointer; color: var(--text3); } .modal-close:hover { color: var(--text); }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.7rem; } .form-group { display: flex; flex-direction: column; gap: 0.2rem; } .form-group.full { grid-column: 1 / -1; }
    .form-label { font-size: 0.72rem; color: var(--text2); font-weight: 600; }
    .form-input, .form-select, .form-textarea { padding: 0.5rem 0.7rem; background: var(--bg); border: 1px solid var(--border); border-radius: 0.35rem; color: var(--text); font-size: 0.85rem; font-family: inherit; } .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--accent); }
    .form-textarea { min-height: 60px; resize: vertical; }
    .rating-input { display: flex; gap: 4px; cursor: pointer; } .rating-star { font-size: 1.3rem; color: var(--border); transition: color 0.1s; } .rating-star.filled { color: var(--accent); } .rating-star:hover { color: var(--accent); }
    .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1rem; }

    /* Book detail modal */
    .detail-header { display: flex; gap: 1rem; margin-bottom: 1rem; }
    .detail-cover { width: 80px; height: 112px; background: var(--border); border-radius: 0.3rem; flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .detail-cover img { width: 100%; height: 100%; object-fit: cover; }
    .detail-title { font-size: 1.2rem; font-weight: 800; color: var(--text); }
    .detail-author { font-size: 0.85rem; color: var(--text2); margin-top: 0.2rem; }
    .detail-meta { font-size: 0.75rem; color: var(--text3); margin-top: 0.3rem; line-height: 1.6; }
    .detail-section { margin-top: 1rem; }
    .detail-section-title { font-size: 0.7rem; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.4rem; padding-bottom: 0.3rem; border-bottom: 1px solid var(--border); }
    .detail-synopsis { font-size: 0.85rem; line-height: 1.8; color: var(--text); background: var(--bg); padding: 0.8rem; border-radius: 0.4rem; }
    .detail-note { font-size: 0.85rem; line-height: 1.7; color: var(--text2); }
    .detail-actions { display: flex; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap; }

    /* Recommend */
    .recommend-section { padding: 1.5rem; }
    .recommend-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.3rem; }
    .recommend-sub { font-size: 0.78rem; color: var(--text3); margin-bottom: 1.2rem; }
    .recommend-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 0.8rem; margin-bottom: 2rem; }
    .recommend-card { background: var(--surface); border: 1px solid var(--border); border-radius: 0.6rem; padding: 0.8rem; display: flex; gap: 0.7rem; cursor: pointer; transition: box-shadow 0.15s; }
    .recommend-card:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.08); }
    .recommend-reason { font-size: 0.7rem; color: var(--accent); margin-top: 0.3rem; font-weight: 600; }
    .rec-category { background: var(--surface); border: 1px solid var(--border); border-radius: 0.6rem; margin-bottom: 1rem; overflow: hidden; }
    .rec-category-header { padding: 0.8rem 1rem; display: flex; align-items: center; gap: 0.6rem; border-bottom: 1px solid var(--border); background: rgba(200,151,63,0.04); }
    .rec-category-icon { font-size: 1.2rem; }
    .rec-category-title { font-size: 0.88rem; font-weight: 700; color: var(--text); }
    .rec-category-desc { font-size: 0.7rem; color: var(--text3); margin-top: 0.1rem; }
    .rec-category-body { padding: 0.6rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 0.5rem; }

    /* Stats */
    .stats-section { padding: 1.5rem; }
    .stats-tabs { display: flex; gap: 0.3rem; margin-bottom: 1.2rem; flex-wrap: wrap; }
    .stats-tab {
      padding: 0.45rem 0.9rem; font-size: 0.78rem; color: var(--text3); cursor: pointer;
      background: var(--surface); border: 1px solid var(--border); border-radius: 2rem;
      transition: all 0.15s; font-weight: 600;
    }
    .stats-tab:hover { border-color: var(--accent); color: var(--accent); }
    .stats-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .stats-panel { display: none; } .stats-panel.active { display: block; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.8rem; margin-bottom: 1.5rem; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 0.5rem; padding: 1rem; text-align: center; }
    .stat-val { font-size: 2rem; font-weight: 800; color: var(--accent); } .stat-label { font-size: 0.72rem; color: var(--text3); margin-top: 0.2rem; }
    .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 0.6rem; padding: 1.2rem; margin-bottom: 1rem; }
    .chart-title { font-size: 0.72rem; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.8rem; }
    .bar-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.4rem; }
    .bar-label { font-size: 0.78rem; color: var(--text2); min-width: 100px; text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-track { flex: 1; height: 14px; background: var(--bg); border-radius: 7px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 7px; background: linear-gradient(90deg, var(--accent), #E8C878); }
    .bar-val { font-size: 0.75rem; font-weight: 700; color: var(--text2); min-width: 30px; }

    /* Search */
    .search-box { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .search-box input { flex: 1; padding: 0.6rem 0.8rem; background: var(--bg); border: 1px solid var(--border); border-radius: 0.4rem; color: var(--text); font-size: 0.9rem; }
    .search-box input:focus { outline: none; border-color: var(--accent); }
    .search-results-list { max-height: 55vh; overflow-y: auto; }
    .search-result {
      display: flex; gap: 0.8rem; padding: 0.7rem; border: 1px solid var(--border); border-radius: 0.5rem;
      margin-bottom: 0.5rem; cursor: pointer; transition: border-color 0.15s, background 0.15s;
    }
    .search-result:hover { border-color: var(--accent); background: rgba(200,151,63,0.04); }
    .search-result-cover { width: 50px; height: 72px; background: var(--border); border-radius: 0.2rem; flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .search-result-cover img { width: 100%; height: 100%; object-fit: cover; }
    .search-result-info { flex: 1; min-width: 0; }
    .search-result-title { font-size: 0.88rem; font-weight: 700; color: var(--text); }
    .search-result-author { font-size: 0.75rem; color: var(--text2); margin-top: 0.1rem; }
    .search-result-desc { font-size: 0.72rem; color: var(--text3); margin-top: 0.3rem; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .search-result-meta { font-size: 0.65rem; color: var(--text3); margin-top: 0.3rem; }
    .search-result .btn { flex-shrink: 0; align-self: center; }
    .search-loading { text-align: center; padding: 2rem; color: var(--text3); }
    .search-empty { text-align: center; padding: 2rem; color: var(--text3); font-size: 0.85rem; }

    /* Diagnosis */
    .diag-section { padding: 1.5rem; max-width: 640px; margin: 0 auto; }
    .diag-result { background: var(--surface); border: 1px solid var(--border); border-radius: 1rem; overflow: hidden; margin-bottom: 1.5rem; }
    .diag-header { padding: 2rem 1.5rem; text-align: center; background: linear-gradient(135deg, #2A1810 0%, #3A2218 100%); color: #F7F0E3; }
    .diag-type-code { font-size: 0.75rem; letter-spacing: 0.3em; color: var(--accent); margin-bottom: 0.5rem; }
    .diag-author { font-size: 2rem; font-weight: 800; font-family: Georgia, serif; margin-bottom: 0.3rem; }
    .diag-subtitle { font-size: 0.85rem; color: #A09080; }
    .diag-body { padding: 1.5rem; }
    .diag-desc { font-size: 0.88rem; line-height: 1.8; color: var(--text); margin-bottom: 1.2rem; }
    .diag-axes { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; margin-bottom: 1.2rem; }
    .diag-axis { background: var(--bg); border-radius: 0.5rem; padding: 0.7rem; }
    .diag-axis-label { font-size: 0.65rem; color: var(--text3); letter-spacing: 0.08em; margin-bottom: 0.4rem; }
    .diag-axis-bar { display: flex; height: 8px; border-radius: 4px; overflow: hidden; margin-bottom: 0.3rem; }
    .diag-axis-bar div { height: 100%; }
    .diag-axis-names { display: flex; justify-content: space-between; font-size: 0.68rem; color: var(--text2); }
    .diag-traits { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-bottom: 1rem; }
    .diag-trait { font-size: 0.72rem; padding: 0.2rem 0.6rem; border-radius: 1rem; background: rgba(200,151,63,0.12); color: var(--accent); font-weight: 600; }
    .diag-compat { background: var(--bg); border-radius: 0.5rem; padding: 0.8rem; }
    .diag-compat-title { font-size: 0.7rem; color: var(--text3); margin-bottom: 0.4rem; font-weight: 600; }
    .diag-compat-item { font-size: 0.82rem; color: var(--text); margin-bottom: 0.2rem; }
    .diag-empty { text-align: center; padding: 4rem 2rem; color: var(--text3); }

    /* Heatmap */
    .heatmap-wrap { overflow-x: auto; }
    .heatmap { border-collapse: collapse; font-size: 0.7rem; min-width: 100%; }
    .heatmap th { padding: 0.35rem 0.5rem; font-weight: 600; color: var(--text2); white-space: nowrap; position: sticky; top: 0; background: var(--surface); }
    .heatmap th.genre-label { text-align: left; min-width: 90px; }
    .heatmap th.month-label { text-align: center; writing-mode: horizontal-tb; font-size: 0.62rem; }
    .heatmap td { padding: 0; text-align: center; }
    .heatmap-cell {
      width: 32px; height: 28px; margin: 1px auto; border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.62rem; font-weight: 700; color: transparent; transition: all 0.15s;
    }
    .heatmap-cell:hover { color: #fff; transform: scale(1.2); }
    .heatmap-cell.lv0 { background: var(--bg); }
    .heatmap-cell.lv1 { background: rgba(200,151,63,0.2); color: transparent; }
    .heatmap-cell.lv2 { background: rgba(200,151,63,0.4); }
    .heatmap-cell.lv3 { background: rgba(200,151,63,0.6); }
    .heatmap-cell.lv4 { background: rgba(200,151,63,0.8); }
    .heatmap-cell.lv5 { background: var(--accent); }
    .heatmap-legend { display: flex; align-items: center; gap: 0.3rem; margin-top: 0.5rem; justify-content: flex-end; font-size: 0.65rem; color: var(--text3); }
    .heatmap-legend-cell { width: 14px; height: 14px; border-radius: 2px; }

    @media (max-width: 768px) {
      .board { grid-template-columns: 1fr; padding: 1rem; }
      .column { min-height: 200px; }
      .recommend-grid { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo"><span>Book</span>Board</div>
    <div class="header-actions">
      <button class="btn btn-primary btn-sm" id="install-btn" style="display:none;" onclick="installApp()">📲 アプリをインストール</button>
      <button class="btn btn-outline btn-sm" onclick="openSearch()">🔍 本を検索・追加</button>
      <button class="btn btn-outline btn-sm" onclick="openAddBook()">✏️ 手動追加</button>
      <button class="btn btn-outline btn-sm" onclick="loadDemo()">🎲 Demo</button>
      <button class="btn btn-outline btn-sm" onclick="exportData()">📥</button>
      <button class="btn btn-outline btn-sm" onclick="document.getElementById('import-file').click()">📤</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
    </div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchPage(this,'page-board')">📋 Board</button>
    <button class="nav-tab" onclick="switchPage(this,'page-recommend')">💡 Recommend</button>
    <button class="nav-tab" onclick="switchPage(this,'page-stats')">📊 Stats</button>
    <button class="nav-tab" onclick="switchPage(this,'page-diagnosis')">🎭 文豪診断</button>
  </div>

  <!-- BOARD -->
  <div class="page active" id="page-board">
    <div class="board">
      <div class="column col-want"><div class="column-header"><div class="column-title">📚 読みたい <span class="column-count" id="count-want">0</span></div></div><div class="column-body" id="col-want" ondragover="dragOver(event)" ondrop="drop(event,'want')"></div></div>
      <div class="column col-reading"><div class="column-header"><div class="column-title">📖 読んでる <span class="column-count" id="count-reading">0</span></div></div><div class="column-body" id="col-reading" ondragover="dragOver(event)" ondrop="drop(event,'reading')"></div></div>
      <div class="column col-done"><div class="column-header"><div class="column-title">✅ 読了 <span class="column-count" id="count-done">0</span></div></div><div class="column-body" id="col-done" ondragover="dragOver(event)" ondrop="drop(event,'done')"></div></div>
    </div>
  </div>

  <!-- RECOMMEND -->
  <div class="page" id="page-recommend"><div id="recommend-content"></div></div>

  <!-- DIAGNOSIS -->
  <div class="page" id="page-diagnosis"><div id="diagnosis-content"></div></div>

  <!-- STATS -->
  <div class="page" id="page-stats"><div id="stats-content"></div></div>

  <!-- Add/Edit Modal -->
  <div class="modal-overlay" id="modal-add" onclick="if(event.target===this)closeModal('modal-add')">
    <div class="modal">
      <button class="modal-close" onclick="closeModal('modal-add')">✕</button>
      <div class="modal-title" id="modal-add-title">本を追加</div>
      <div class="form-grid">
        <div class="form-group full"><label class="form-label">タイトル</label><input class="form-input" id="f-title" placeholder="例: 汝、星のごとく"></div>
        <div class="form-group"><label class="form-label">著者</label><input class="form-input" id="f-author" placeholder="例: 凪良ゆう"></div>
        <div class="form-group"><label class="form-label">ジャンル</label><select class="form-select" id="f-genre"><option value="">選択</option><option>ヒューマンドラマ</option><option>ミステリー</option><option>SF・ファンタジー</option><option>青春</option><option>歴史・時代</option><option>恋愛</option><option>お仕事</option><option>社会派</option><option>エッセイ</option><option>ノンフィクション</option><option>その他</option></select></div>
        <div class="form-group"><label class="form-label">受賞歴</label><input class="form-input" id="f-award" placeholder="例: 本屋大賞, 直木賞"></div>
        <div class="form-group"><label class="form-label">出版年</label><input class="form-input" id="f-year" type="number" placeholder="2023"></div>
        <div class="form-group"><label class="form-label">ステータス</label><select class="form-select" id="f-status"><option value="want">読みたい</option><option value="reading">読んでる</option><option value="done">読了</option></select></div>
        <div class="form-group"><label class="form-label">読了日</label><input class="form-input" id="f-donedate" type="date"></div>
        <div class="form-group full"><label class="form-label">評価（5段階）</label><div class="rating-input" id="f-rating"></div></div>
        <div class="form-group full"><label class="form-label">メモ・感想</label><textarea class="form-textarea" id="f-note" placeholder="自由にメモ"></textarea></div>
      </div>
      <input type="hidden" id="f-id">
      <input type="hidden" id="f-cover">
      <input type="hidden" id="f-synopsis">
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal('modal-add')">Cancel</button>

      openModal('modal-search');
      setTimeout(() => document.getElementById('search-input').focus(), 100);
    }

    function esc(str) {
      const d = document.createElement('div'); d.textContent = str; return d.innerHTML;
    }

    async function searchBooks() {
      const q = document.getElementById('search-input').value.trim();
      if (!q) return;
      const el = document.getElementById('search-results');
      el.innerHTML = '<div class="search-loading">検索中...</div>';

      if (location.protocol === 'file:') {
        el.innerHTML = '<div class="search-empty">ローカルファイルでは検索できません。<br><a href="https://furukawa-0116.github.io/bookboard/" target="_blank" style="color:var(--accent);">こちらのURLで開いてください →</a></div>';
        return;
      }
      try {
        var resList = await Promise.all([
          fetch('https://www.googleapis.com/books/v1/volumes?q=intitle:' + encodeURIComponent(q) + '&maxResults=10').then(function(r){return r.json();}).catch(function(){return {items:[]};}),
          fetch('https://www.googleapis.com/books/v1/volumes?q=inauthor:' + encodeURIComponent(q) + '&maxResults=10').then(function(r){return r.json();}).catch(function(){return {items:[]};}),
          fetch('https://www.googleapis.com/books/v1/volumes?q=' + encodeURIComponent(q) + '&maxResults=10').then(function(r){return r.json();}).catch(function(){return {items:[]};}),
        ]);
        var seen = {};
        var allItems = [];
        (resList[0].items||[]).concat(resList[1].items||[]).concat(resList[2].items||[]).forEach(function(item) {
          var key = (item.volumeInfo.title||'') + '/' + ((item.volumeInfo.authors||[]).join(','));
          if (!seen[key]) { seen[key] = true; allItems.push(item); }
        });

        if (allItems.length === 0) {
          el.innerHTML = '<div class="search-empty">見つかりませんでした。別のキーワードで試してください。</div>';
          return;
        }

        window._searchResults = allItems;
        el.innerHTML = '';

        allItems.forEach(function(item, i) {
          var v = item.volumeInfo;
          var title = v.title || '';
          var authors = (v.authors || []).join(', ');
          var desc = v.description || '';
          var thumb = (v.imageLinks && v.imageLinks.thumbnail) ? v.imageLinks.thumbnail.replace('http:', 'https:') : '';
          var year = v.publishedDate ? v.publishedDate.slice(0, 4) : '';
          var categories = (v.categories || []).join(', ');
          var pages = v.pageCount || '';
          var already = books.find(function(b) { return b.title === title && b.author === authors; });

          var div = document.createElement('div');
          div.className = 'search-result';
          div.onclick = function() { addSearchResult(i); };

          var coverDiv = document.createElement('div');
          coverDiv.className = 'search-result-cover';
          if (thumb) { var img = document.createElement('img'); img.src = thumb; coverDiv.appendChild(img); }
          else { coverDiv.textContent = '📖'; }

          var infoDiv = document.createElement('div');
          infoDiv.className = 'search-result-info';

          var titleDiv = document.createElement('div');
          titleDiv.className = 'search-result-title';
          titleDiv.textContent = title;

          var authorDiv = document.createElement('div');
          authorDiv.className = 'search-result-author';
          authorDiv.textContent = authors || '著者不明';

          infoDiv.appendChild(titleDiv);
          infoDiv.appendChild(authorDiv);

          if (desc) {
            var descDiv = document.createElement('div');
            descDiv.className = 'search-result-desc';
            descDiv.textContent = desc.length > 120 ? desc.slice(0, 120) + '...' : desc;
            infoDiv.appendChild(descDiv);
          }

          var metaDiv = document.createElement('div');
          metaDiv.className = 'search-result-meta';
          metaDiv.textContent = [year ? year + '年' : '', categories, pages ? pages + 'p' : ''].filter(Boolean).join(' ・ ');
          infoDiv.appendChild(metaDiv);

          div.appendChild(coverDiv);
          div.appendChild(infoDiv);

          if (already) {
            var badge = document.createElement('span');
            badge.className = 'btn btn-ghost btn-sm';
            badge.textContent = '登録済';
            badge.style.pointerEvents = 'none';
            div.appendChild(badge);
          } else {
            var btnWrap = document.createElement('div');
            btnWrap.style.cssText = 'display:flex;flex-direction:column;gap:3px;flex-shrink:0;';
            var statuses = [
              { key: 'want', label: '📚 読みたい', color: 'var(--want-accent)' },
              { key: 'reading', label: '📖 読んでる', color: 'var(--reading-accent)' },
              { key: 'done', label: '✅ 読了', color: 'var(--done-accent)' },
            ];
            statuses.forEach(function(s) {
              var b = document.createElement('button');
              b.className = 'btn btn-ghost btn-sm';
              b.textContent = s.label;
              b.style.cssText = 'font-size:0.65rem;padding:0.2rem 0.5rem;white-space:nowrap;border-color:' + s.color + ';color:' + s.color + ';';
              b.onclick = function(e) { e.stopPropagation(); addSearchResult(i, s.key); };
              btnWrap.appendChild(b);
            });
            div.appendChild(btnWrap);
          }
          el.appendChild(div);
        });
      } catch (err) {
        el.innerHTML = '<div class="search-empty">エラー: ' + esc(err.message) + '</div>';
      }
    }

    function addSearchResult(idx, status) {
      const item = window._searchResults?.[idx];
      if (!item) return;
      const v = item.volumeInfo;
      const title = v.title || '';
      const authors = (v.authors || []).join(', ');

      if (books.find(b => b.title === title && b.author === authors)) {
        alert('既に登録済みです');
        return;
      }

      const thumb = v.imageLinks?.thumbnail?.replace('http:', 'https:') || '';
      const desc = v.description || '';
      const year = v.publishedDate ? Number(v.publishedDate.slice(0, 4)) : 0;
      const categories = (v.categories || []).join(', ');

      // Auto-detect genre from categories
      const genre = detectGenre(categories, title, desc);

      // Check if it's in our bookDB (for award info)
      const dbMatch = bookDB.find(d => d.t === title || (d.a === authors && title.includes(d.t.slice(0, 4))));

      books.push({
        id: Date.now().toString(),
        title, author: authors, genre,
        award: dbMatch?.aw || '',
        year, status: status || 'want', rating: 0,
        note: '', cover: thumb, synopsis: desc,
      });

      save(); renderBoard(); searchBooks(); // Re-render to show "登録済"
    }

    function detectGenre(categories, title, desc) {
      const text = (categories + ' ' + title + ' ' + desc).toLowerCase();
      if (text.includes('mystery') || text.includes('ミステリ') || text.includes('推理') || text.includes('殺人')) return 'ミステリー';
      if (text.includes('fantasy') || text.includes('sf') || text.includes('ファンタジー')) return 'SF・ファンタジー';
      if (text.includes('history') || text.includes('歴史') || text.includes('時代')) return '歴史・時代';
      if (text.includes('romance') || text.includes('恋愛') || text.includes('ラブ')) return '恋愛';
      if (text.includes('young') || text.includes('青春') || text.includes('高校')) return '青春';
      if (text.includes('business') || text.includes('仕事') || text.includes('職業')) return 'お仕事';
      if (text.includes('social') || text.includes('社会')) return '社会派';
      if (text.includes('fiction') || text.includes('小説') || text.includes('literary')) return 'ヒューマンドラマ';
      return '';
    }

    // ===== BOARD =====
    function renderBoard() {
      ['want','reading','done'].forEach(status => {
        const col = document.getElementById('col-'+status);
        const list = books.filter(b => b.status === status);
        document.getElementById('count-'+status).textContent = list.length;
        col.innerHTML = list.map(b => `
          <div class="book-card" draggable="true" ondragstart="dragStart(event,'${b.id}')" onclick="openDetail('${b.id}')">
            <div class="book-cover">${b.cover ? `<img src="${b.cover}" alt="">` : '📖'}</div>
            <div class="book-card-info">
              <div class="book-card-title">${b.title}</div>
              <div class="book-card-author">${b.author}</div>
              <div class="book-card-tags">
                ${b.genre ? `<span class="tag tag-genre">${b.genre}</span>` : ''}
                ${b.award ? `<span class="tag tag-award">${b.award.split(',')[0]}</span>` : ''}
              </div>
              ${b.rating ? `<div class="book-card-rating">${[1,2,3,4,5].map(i=>`<span class="star ${i<=b.rating?'filled':''}">★</span>`).join('')}</div>` : ''}
            </div>
          </div>`).join('') || `<div style="text-align:center;padding:2rem;color:var(--text3);font-size:0.82rem;">ここに本をドラッグ</div>`;
      });
    }

    // ===== DRAG & DROP =====
    let dragId = null;
    function dragStart(e, id) { dragId = id; e.dataTransfer.effectAllowed = 'move'; e.target.classList.add('dragging'); }
    function dragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
    function drop(e, status) { e.preventDefault(); e.currentTarget.classList.remove('drag-over'); if(!dragId) return; const b = books.find(x=>x.id===dragId); if(b) { b.status = status; if(status==='done'&&!b.doneDate) b.doneDate=new Date().toISOString().slice(0,10); save(); renderBoard(); } dragId = null; }
    document.addEventListener('dragend', () => { document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over')); document.querySelectorAll('.dragging').forEach(el=>el.classList.remove('dragging')); });

    // ===== ADD / EDIT BOOK =====
    function openAddBook() {
      editingId = null; ratingVal = 0;
      document.getElementById('modal-add-title').textContent = '本を追加';
      ['f-title','f-author','f-award','f-note','f-cover','f-synopsis','f-donedate'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('f-genre').value = ''; document.getElementById('f-year').value = ''; document.getElementById('f-status').value = 'want'; document.getElementById('f-id').value = '';
      renderRatingInput(); openModal('modal-add');
    }
    function openEditBook(id) {
      const b = books.find(x=>x.id===id); if(!b) return; editingId = id; ratingVal = b.rating || 0;
      document.getElementById('modal-add-title').textContent = '本を編集';
      document.getElementById('f-title').value = b.title; document.getElementById('f-author').value = b.author; document.getElementById('f-genre').value = b.genre || '';
      document.getElementById('f-award').value = b.award || ''; document.getElementById('f-year').value = b.year || ''; document.getElementById('f-status').value = b.status;
      document.getElementById('f-note').value = b.note || ''; document.getElementById('f-donedate').value = b.doneDate || ''; document.getElementById('f-id').value = b.id;
      document.getElementById('f-cover').value = b.cover || ''; document.getElementById('f-synopsis').value = b.synopsis || '';
      renderRatingInput(); openModal('modal-add'); closeModal('modal-detail');
    }
    function renderRatingInput() {
      document.getElementById('f-rating').innerHTML = [1,2,3,4,5].map(i => `<span class="rating-star ${i<=ratingVal?'filled':''}" onclick="ratingVal=${i};renderRatingInput();">★</span>`).join('');
    }
    function saveBook() {
      const title = document.getElementById('f-title').value.trim(); if (!title) return;
      const data = { title, author: document.getElementById('f-author').value.trim(), genre: document.getElementById('f-genre').value, award: document.getElementById('f-award').value.trim(), year: Number(document.getElementById('f-year').value) || 0, status: document.getElementById('f-status').value, doneDate: document.getElementById('f-donedate').value, rating: ratingVal, note: document.getElementById('f-note').value.trim(), cover: document.getElementById('f-cover').value, synopsis: document.getElementById('f-synopsis').value };
      if (editingId) { const b = books.find(x=>x.id===editingId); if(b) Object.assign(b, data); }
      else { data.id = Date.now().toString(); books.push(data); }
      save(); closeModal('modal-add'); renderBoard();
    }
    function deleteBook(id) { if(!confirm('削除しますか？')) return; books = books.filter(b=>b.id!==id); save(); closeModal('modal-detail'); renderBoard(); }

    // ===== ADD FROM DB =====
    function addFromDB(idx) {
      const d = bookDB[idx];
      if (books.find(b => b.title === d.t)) { alert('既に登録済みです'); return; }
      books.push({ id: Date.now().toString(), title: d.t, author: d.a, genre: d.g, award: d.aw, year: d.y, status: 'want', rating: 0, note: '', cover: '', synopsis: d.s });
      save(); renderBoard(); renderRecommend();
    }

    // ===== DETAIL =====
    function openDetail(id) {
      const b = books.find(x=>x.id===id); if(!b) return;
      const stars = b.rating ? [1,2,3,4,5].map(i=>`<span class="star ${i<=b.rating?'filled':''}">★</span>`).join('') : 'なし';
      document.getElementById('detail-content').innerHTML = `
        <div class="detail-header">
          <div class="detail-cover">${b.cover ? `<img src="${b.cover}">` : '📖'}</div>
          <div>
            <div class="detail-title">${b.title}</div>
            <div class="detail-author">著 / ${b.author}</div>
            <div class="detail-meta">
              ${b.genre ? 'ジャンル: '+b.genre+'<br>' : ''}${b.award ? '受賞歴: '+b.award+'<br>' : ''}${b.year ? '出版年: '+b.year+'年<br>' : ''}評価: ${stars}
            </div>
          </div>
        </div>
        ${b.synopsis ? `<div class="detail-section"><div class="detail-section-title">あらすじ</div><div class="detail-synopsis">${b.synopsis}</div></div>` : ''}
        ${b.note ? `<div class="detail-section"><div class="detail-section-title">メモ・感想</div><div class="detail-note">${b.note}</div></div>` : ''}
        <div class="detail-actions">
          <button class="btn btn-accent btn-sm" onclick="openEditBook('${b.id}')">編集</button>
          <button class="btn btn-ghost btn-sm" style="color:var(--red);border-color:var(--red);" onclick="deleteBook('${b.id}')">削除</button>
        </div>
      `;
      openModal('modal-detail');
    }

    // ===== RECOMMEND =====
    function renderRecommend() {
      var done = books.filter(function(b){return b.status==='done';});
      var rated = done.filter(function(b){return b.rating;});
      var registered = {};
      books.forEach(function(b){registered[b.title]=true;});
      var available = bookDB.filter(function(d){return !registered[d.t];});
      var el = document.getElementById('recommend-content');

      if (!done.length) {
        el.innerHTML = '<div class="recommend-section"><div class="recommend-title">おすすめを表示するには</div><div class="recommend-sub">まず本を「読了」に移動して評価をつけてください。</div>' + recDBSection(available) + '</div>';
        return;
      }

      // Analysis
      var genreCount = {}, genreRating = {}, authorRating = {}, genreLastRead = {};
      done.forEach(function(b) {
        if (b.genre) {
          genreCount[b.genre] = (genreCount[b.genre]||0) + 1;
          if (b.rating) {
            if (!genreRating[b.genre]) genreRating[b.genre] = {sum:0,count:0};
            genreRating[b.genre].sum += b.rating; genreRating[b.genre].count++;
          }
          if (b.doneDate) {
            if (!genreLastRead[b.genre] || b.doneDate > genreLastRead[b.genre]) genreLastRead[b.genre] = b.doneDate;
          }
        }
        if (b.author && b.rating) {
          if (!authorRating[b.author]) authorRating[b.author] = {sum:0,count:0};
          authorRating[b.author].sum += b.rating; authorRating[b.author].count++;
        }
      });

      var categories = [];
      var usedTitles = {};

      function pickAvail(filter, max) {
        var res = [];
        available.forEach(function(d) {
          if (res.length >= max || usedTitles[d.t]) return;
          if (filter(d)) { usedTitles[d.t] = true; res.push(d); }
        });
        return res;
      }

      // 1. 高評価著者の別作品
      var topRatedAuthors = Object.entries(authorRating)
        .map(function(x){return {a:x[0], avg:x[1].sum/x[1].count};})
        .filter(function(x){return x.avg >= 4;})
        .sort(function(a,b){return b.avg - a.avg;});
      var authorRecs = [];
      topRatedAuthors.forEach(function(x) {
        pickAvail(function(d){return d.a === x.a;}, 1).forEach(function(d) {
          authorRecs.push({d:d, reason: x.a + ' 平均★' + x.avg.toFixed(1)});
        });
      });
      if (authorRecs.length) categories.push({
        icon:'⭐', title:'高評価著者の別作品', desc:'★4以上つけた著者のまだ読んでない作品',
        items: authorRecs
      });

      // 2. 好きなジャンル
      var topGenres = Object.entries(genreCount).sort(function(a,b){return b[1]-a[1];}).slice(0,3);
      var genreRecs = [];
      topGenres.forEach(function(x) {
        pickAvail(function(d){return d.g === x[0];}, 2).forEach(function(d) {
          genreRecs.push({d:d, reason: '「' + x[0] + '」' + x[1] + '冊読了'});
        });
      });
      if (genreRecs.length) categories.push({
        icon:'📚', title:'好きなジャンルから', desc:'よく読むジャンルの未読作品',
        items: genreRecs
      });

      // 3. 名作チャレンジ（受賞作で未読）
      var masterRecs = [];
      pickAvail(function(d){return d.aw && d.aw.indexOf('ノミネート') === -1;}, 4).forEach(function(d) {
        masterRecs.push({d:d, reason: d.aw});
      });
      if (masterRecs.length) categories.push({
        icon:'🏆', title:'名作チャレンジ', desc:'受賞作でまだ読んでない名作',
        items: masterRecs
      });

      // 4. 季節に合った本
      var month = new Date().getMonth() + 1;
      var seasonKeywords = {spring:[3,4,5], summer:[6,7,8], autumn:[9,10,11], winter:[12,1,2]};
      var seasonBooks = {
        spring: ['青春','恋愛'], summer: ['ミステリー','SF・ファンタジー'],
        autumn: ['ヒューマンドラマ','歴史・時代'], winter: ['ヒューマンドラマ','恋愛']
      };
      var currentSeason = month<=2?'winter':month<=5?'spring':month<=8?'summer':month<=11?'autumn':'winter';
      var seasonLabel = {spring:'春',summer:'夏',autumn:'秋',winter:'冬'}[currentSeason];
      var seasonGenres = seasonBooks[currentSeason];
      var seasonRecs = [];
      pickAvail(function(d){return seasonGenres.indexOf(d.g) >= 0;}, 3).forEach(function(d) {
        seasonRecs.push({d:d, reason: seasonLabel + 'に読みたい「' + d.g + '」'});
      });
      if (seasonRecs.length) categories.push({
        icon:'🌸', title: seasonLabel + 'のおすすめ', desc:'今の季節にぴったりの作品',
        items: seasonRecs
      });

      // 5. 読了から遠いジャンル
      var today = new Date().toISOString().slice(0,10);
      var staleGenres = Object.entries(genreLastRead)
        .filter(function(x){
          var diff = (new Date(today) - new Date(x[1])) / (1000*60*60*24);
          return diff > 60;
        })
        .sort(function(a,b){return a[1].localeCompare(b[1]);});
      var staleRecs = [];
      staleGenres.slice(0,2).forEach(function(x) {
        pickAvail(function(d){return d.g === x[0];}, 1).forEach(function(d) {
          var months = Math.round((new Date(today) - new Date(x[1])) / (1000*60*60*24*30));
          staleRecs.push({d:d, reason: x[0] + ' ' + months + 'ヶ月ぶり'});
        });
      });
      if (staleRecs.length) categories.push({
        icon:'🔄', title:'久しぶりのジャンル', desc:'最近読んでないジャンルをリマインド',
        items: staleRecs
      });

      // 6. 評価が低めのジャンルの名作
      var lowGenres = Object.entries(genreRating)
        .filter(function(x){return x[1].count >= 2 && x[1].sum/x[1].count < 3.8;})
        .sort(function(a,b){return (a[1].sum/a[1].count) - (b[1].sum/b[1].count);});
      var rediscoverRecs = [];
      lowGenres.slice(0,2).forEach(function(x) {
        var avg = (x[1].sum/x[1].count).toFixed(1);
        pickAvail(function(d){return d.g===x[0] && d.aw && d.aw.indexOf('ノミネート')===-1;}, 1).forEach(function(d) {
          rediscoverRecs.push({d:d, reason: x[0] + '(平均★' + avg + ')の中でも特におすすめ'});
        });
      });
      if (rediscoverRecs.length) categories.push({
        icon:'💎', title:'ジャンル再発見', desc:'評価が伸びなかったジャンルの隠れた名作',
        items: rediscoverRecs
      });

      // 7. まだ読んでないジャンル
      var allGenres = {};
      bookDB.forEach(function(d){allGenres[d.g]=true;});
      var unexplored = Object.keys(allGenres).filter(function(g){return !genreCount[g];});
      var unexploredRecs = [];
      unexplored.forEach(function(g) {
        pickAvail(function(d){return d.g===g;}, 1).forEach(function(d) {
          unexploredRecs.push({d:d, reason: '未体験の「' + g + '」'});
        });
      });
      if (unexploredRecs.length) categories.push({
        icon:'🌍', title:'未知のジャンルへ', desc:'まだ読んだことのないジャンルに挑戦',
        items: unexploredRecs
      });

      // Render
      var totalRecs = 0;
      categories.forEach(function(c){totalRecs += c.items.length;});

      var html = '<div class="recommend-section">' +
        '<div class="recommend-title">あなたへのおすすめ</div>' +
        '<div class="recommend-sub">読了' + done.length + '冊の傾向を7つの視点で分析 → ' + totalRecs + '冊をピックアップ</div>';

      categories.forEach(function(cat) {
        html += '<div class="rec-category">' +
          '<div class="rec-category-header"><span class="rec-category-icon">' + cat.icon + '</span><div><div class="rec-category-title">' + cat.title + '</div><div class="rec-category-desc">' + cat.desc + '</div></div></div>' +
          '<div class="rec-category-body">';
        cat.items.forEach(function(item) {
          var idx = bookDB.indexOf(bookDB.find(function(x){return x.t===item.d.t;}));
          html += '<div class="recommend-card" onclick="addFromDB(' + (idx>=0?idx:0) + ')">' +
            '<div class="book-cover" style="width:45px;height:63px;">📖</div>' +
            '<div class="book-card-info">' +
              '<div class="book-card-title">' + item.d.t + '</div>' +
              '<div class="book-card-author">' + item.d.a + '</div>' +
              '<div class="book-card-tags"><span class="tag tag-genre">' + item.d.g + '</span>' +
                (item.d.aw ? '<span class="tag tag-award">' + item.d.aw.split(',')[0] + '</span>' : '') +
              '</div>' +
              '<div class="recommend-reason">' + item.reason + '</div>' +
            '</div></div>';
        });
        html += '</div></div>';
      });

      html += recDBSection(available) + '</div>';
      el.innerHTML = html;
    }

    function recDBSection(available) {
      if (!available.length) return '';

    function renderDiagnosis() {
      var done = books.filter(function(b){return b.status==='done' && b.rating;});
      var el = document.getElementById('diagnosis-content');

      if (done.length < 5) {
        el.innerHTML = '<div class="diag-empty"><div style="font-size:3rem;margin-bottom:1rem;opacity:0.3;">🎭</div><div style="font-size:0.9rem;margin-bottom:0.5rem;">文豪診断を行うには</div><div style="font-size:0.82rem;">評価付きの読了本が5冊以上必要です（現在 ' + done.length + '冊）</div></div>';
        return;
      }

      // Score 4 axes
      var heart=0, mind=0, real=0, imag=0, still=0, dynamic=0, classicYears=0, yearCount=0;
      done.forEach(function(b) {
        var w = b.rating || 3; // weight by rating
        var g = b.genre || '';
        // Axis 1: Heart vs Mind
        if (['ヒューマンドラマ','恋愛','青春'].indexOf(g)>=0) heart += w;
        else if (['ミステリー','社会派','お仕事'].indexOf(g)>=0) mind += w;
        else { heart += w*0.5; mind += w*0.5; }
        // Axis 2: Real vs Imaginary
        if (['ヒューマンドラマ','お仕事','社会派'].indexOf(g)>=0) real += w;
        else if (['SF・ファンタジー'].indexOf(g)>=0) imag += w;
        else if (['ミステリー'].indexOf(g)>=0) { real += w*0.3; imag += w*0.7; }
        else if (['歴史・時代'].indexOf(g)>=0) { real += w*0.7; imag += w*0.3; }
        else { real += w*0.5; imag += w*0.5; }
        // Axis 3: Still vs Dynamic
        if (['恋愛','ヒューマンドラマ','社会派'].indexOf(g)>=0) still += w;
        else if (['ミステリー','青春','歴史・時代','SF・ファンタジー'].indexOf(g)>=0) dynamic += w;
        else { still += w*0.5; dynamic += w*0.5; }
        // Axis 4: Classic vs Modern
        if (b.year) { classicYears += b.year; yearCount++; }
      });

      var avgYear = yearCount ? classicYears / yearCount : 2015;
      var code = (heart>=mind?'H':'M') + (real>=imag?'R':'I') + (still>=dynamic?'S':'D') + (avgYear<2010?'C':'N');
      var type = bungouTypes[code] || bungouTypes['HRSN'];

      var hPct = Math.round(heart/(heart+mind)*100) || 50;
      var rPct = Math.round(real/(real+imag)*100) || 50;
      var sPct = Math.round(still/(still+dynamic)*100) || 50;
      var cPct = avgYear < 2010 ? Math.round((2020-avgYear)/30*100) : Math.round((2020-avgYear)/30*100);
      cPct = Math.max(10, Math.min(90, 50 + (2010-avgYear)*3));

      el.innerHTML = '<div class="diag-section">' +
        '<div class="diag-result">' +
          '<div class="diag-header">' +
            '<div class="diag-type-code">' + code + '</div>' +
            '<div class="diag-author">' + type.name + '</div>' +
            '<div class="diag-subtitle">' + type.sub + '</div>' +
          '</div>' +
          '<div class="diag-body">' +
            '<div class="diag-desc">' + type.desc + '</div>' +
            '<div class="diag-axes">' +
              diagAxis('感情派 vs 理知派', '感情', '理知', hPct, '#E8C878', '#4F8CFF') +
              diagAxis('現実派 vs 幻想派', '現実', '幻想', rPct, '#00D68F', '#6C5CE7') +
              diagAxis('静寂派 vs 躍動派', '静寂', '躍動', sPct, '#90CAF9', '#FF6B6B') +
              diagAxis('古典派 vs 現代派', '古典', '現代', cPct, '#A1887F', '#FDCB6E') +
            '</div>' +
            '<div style="font-size:0.72rem;color:var(--text3);margin-bottom:0.5rem;font-weight:600;">あなたの読書特性</div>' +
            '<div class="diag-traits">' + type.traits.map(function(t){return '<span class="diag-trait">' + t + '</span>';}).join('') + '</div>' +
            '<div class="diag-compat">' +
              '<div class="diag-compat-title">💡 相性の良いタイプ</div>' +
              '<div class="diag-compat-item">' + type.compat + '</div>' +
            '</div>' +
            '<div class="diag-compat" style="margin-top:0.5rem;">' +
              '<div class="diag-compat-title">📖 このタイプにおすすめの代表作</div>' +
              '<div class="diag-compat-item">' + type.books + '</div>' +
            '</div>' +
            '<div style="margin-top:1rem;font-size:0.72rem;color:var(--text3);text-align:center;">読了 ' + done.length + '冊・平均出版年 ' + Math.round(avgYear) + '年 のデータから診断</div>' +
          '</div>' +
        '</div>' +
      '</div>';
    }

    function diagAxis(title, leftName, rightName, leftPct, leftColor, rightColor) {
      return '<div class="diag-axis">' +
        '<div class="diag-axis-label">' + title + '</div>' +
        '<div class="diag-axis-bar">' +
          '<div style="width:' + leftPct + '%;background:' + leftColor + ';"></div>' +
          '<div style="width:' + (100-leftPct) + '%;background:' + rightColor + ';"></div>' +
        '</div>' +
        '<div class="diag-axis-names"><span>' + leftName + ' ' + leftPct + '%</span><span>' + rightName + ' ' + (100-leftPct) + '%</span></div>' +
      '</div>';
    }

    function switchStatsTab(btn, panelId) {
      btn.parentElement.querySelectorAll('.stats-tab').forEach(function(t){t.classList.remove('active');});
      btn.classList.add('active');
      document.querySelectorAll('.stats-panel').forEach(function(p){p.classList.remove('active');});

    function renderGenreMonthHeatmap(done) {
      // Collect all months and genres
      var monthSet = {};
      var genreSet = {};
      var matrix = {};
      done.forEach(function(b) {
        if (!b.doneDate || !b.genre) return;
        var m = b.doneDate.slice(0, 7);
        monthSet[m] = true;
        genreSet[b.genre] = true;
        var key = b.genre + '|' + m;
        matrix[key] = (matrix[key] || 0) + 1;
      });
      var months = Object.keys(monthSet).sort();
      var genres = Object.keys(genreSet).sort();
      if (!months.length || !genres.length) return '';

      var maxVal = 0;
      Object.values(matrix).forEach(function(v) { if (v > maxVal) maxVal = v; });

      function level(v) {
        if (!v) return 'lv0';
        var pct = v / maxVal;
        if (pct <= 0.2) return 'lv1';
        if (pct <= 0.4) return 'lv2';
        if (pct <= 0.6) return 'lv3';
        if (pct <= 0.8) return 'lv4';
        return 'lv5';
      }

      // Header row: months
      var headerHtml = '<th class="genre-label">ジャンル</th>';
      months.forEach(function(m) {
        headerHtml += '<th class="month-label">' + m.slice(2).replace('-', '/') + '</th>';
      });

      // Data rows: genres
      var rowsHtml = '';
      genres.forEach(function(g) {
        rowsHtml += '<tr><th class="genre-label">' + g + '</th>';
        months.forEach(function(m) {
          var val = matrix[g + '|' + m] || 0;
          rowsHtml += '<td><div class="heatmap-cell ' + level(val) + '">' + (val || '') + '</div></td>';
        });
        rowsHtml += '</tr>';
      });

      // Total row
      rowsHtml += '<tr><th class="genre-label" style="color:var(--accent);font-weight:700;">合計</th>';
      months.forEach(function(m) {
        var total = 0;
        genres.forEach(function(g) { total += matrix[g + '|' + m] || 0; });
        rowsHtml += '<td><div class="heatmap-cell" style="font-size:0.65rem;font-weight:800;color:var(--accent);background:none;">' + total + '</div></td>';
      });
      rowsHtml += '</tr>';

      return '<div class="chart-card"><div class="chart-title">ジャンル × 月 ヒートマップ</div>' +
        '<div class="heatmap-wrap"><table class="heatmap"><thead><tr>' + headerHtml + '</tr></thead><tbody>' + rowsHtml + '</tbody></table></div>' +
        '<div class="heatmap-legend"><span>少</span>' +
        '<div class="heatmap-legend-cell" style="background:var(--bg);border:1px solid var(--border);"></div>' +
        '<div class="heatmap-legend-cell" style="background:rgba(200,151,63,0.2);"></div>' +
        '<div class="heatmap-legend-cell" style="background:rgba(200,151,63,0.4);"></div>' +
        '<div class="heatmap-legend-cell" style="background:rgba(200,151,63,0.6);"></div>' +
        '<div class="heatmap-legend-cell" style="background:rgba(200,151,63,0.8);"></div>' +
        '<div class="heatmap-legend-cell" style="background:var(--accent);"></div>' +
        '<span>多</span></div></div>';
    }

    function renderStats() {
      var done = books.filter(function(b){return b.status==='done';});
      var rated = done.filter(function(b){return b.rating;});
      var total = books.length;
      var avgRating = rated.length ? (rated.reduce(function(s,b){return s+b.rating;},0)/rated.length).toFixed(1) : '-';

      // === 1. Overview ===

        '<div class="stat-card"><div class="stat-val" style="color:var(--reading-accent);">' + books.filter(function(b){return b.status==='reading';}).length + '</div><div class="stat-label">読んでる</div></div>' +
        '<div class="stat-card"><div class="stat-val" style="color:var(--green);">' + done.length + '</div><div class="stat-label">読了</div></div>' +
        '<div class="stat-card"><div class="stat-val">' + avgRating + '</div><div class="stat-label">平均評価</div></div>' +
        '</div>';

      // === 2. 月別読了推移 ===
      var monthMap = {};
      done.forEach(function(b) {
        var key = b.doneDate ? b.doneDate.slice(0,7) : 'unknown';
        monthMap[key] = (monthMap[key]||0) + 1;
      });
      var monthSorted = Object.entries(monthMap).filter(function(x){return x[0]!=='unknown';}).sort(function(a,b){return a[0].localeCompare(b[0]);});
      var monthMax = Math.max.apply(null, monthSorted.map(function(x){return x[1];})) || 1;
      var monthHtml = '<div class="chart-card"><div class="chart-title">月別読了推移</div>' +
        (monthSorted.length ? barChart(monthSorted, monthMax) : '<div style="color:var(--text3);font-size:0.82rem;padding:0.5rem;">読了した本に「読了日」を設定すると表示されます</div>') +
        '</div>';

      // === 3. 評価分布（5段階） ===
      var ratingDist = [0,0,0,0,0];
      rated.forEach(function(b) { ratingDist[b.rating-1]++; });
      var ratingMax = Math.max.apply(null, ratingDist) || 1;
      var ratingData = ratingDist.map(function(c,i) { return ['★'.repeat(i+1) + ' (' + (i+1) + ')', c]; });
      var ratingHtml = '<div class="chart-card"><div class="chart-title">評価分布（5段階）</div>' + barChart(ratingData, ratingMax) + '</div>';

      // === 4. ジャンル別評価分析 ===
      var genreRating = {};
      var genreCount2 = {};
      done.forEach(function(b) {
        if (b.genre) {
          if (!genreRating[b.genre]) { genreRating[b.genre] = { sum:0, count:0 }; }
          if (b.rating) { genreRating[b.genre].sum += b.rating; genreRating[b.genre].count++; }
          genreCount2[b.genre] = (genreCount2[b.genre]||0) + 1;
        }
      });
      var genreRatingSorted = Object.entries(genreRating)
        .filter(function(x){return x[1].count > 0;})
        .map(function(x){return [x[0], Math.round(x[1].sum/x[1].count*10)/10];})
        .sort(function(a,b){return b[1]-a[1];});
      var grHtml = '<div class="chart-card"><div class="chart-title">ジャンル別 平均評価</div>' +
        (genreRatingSorted.length ?
          genreRatingSorted.map(function(d) {
            var pct = d[1] / 5 * 100;
            var color = d[1] >= 4 ? 'background:linear-gradient(90deg,var(--green),#66BB6A)' : d[1] >= 3 ? '' : 'background:linear-gradient(90deg,var(--red),#EF5350)';
            return '<div class="bar-row"><div class="bar-label">' + d[0] + '</div><div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;' + color + '"></div></div><div class="bar-val">' + d[1] + '</div></div>';
          }).join('')
        : '<div style="color:var(--text3);font-size:0.82rem;padding:0.5rem;">読了した本に評価をつけると表示されます</div>') +
        '</div>';

      // === 5. ジャンル分布 ===
      var genreAll = {};
      books.forEach(function(b){if(b.genre) genreAll[b.genre]=(genreAll[b.genre]||0)+1;});
      var genreSorted = Object.entries(genreAll).sort(function(a,b){return b[1]-a[1];});
      var genreMax = genreSorted.length ? genreSorted[0][1] : 1;
      var genreHtml = '<div class="chart-card"><div class="chart-title">ジャンル分布（全体）</div>' + barChart(genreSorted, genreMax) + '</div>';

      // === 6. 時期別ジャンル分布 ===
      var periodGenre = {};
      done.forEach(function(b) {
        if (b.doneDate && b.genre) {
          var q = b.doneDate.slice(0,7);
          if (!periodGenre[q]) periodGenre[q] = {};
          periodGenre[q][b.genre] = (periodGenre[q][b.genre]||0) + 1;
        }
      });
      var periodKeys = Object.keys(periodGenre).sort();
      var periodGenreHtml = '';
      if (periodKeys.length) {
        periodGenreHtml = '<div class="chart-card"><div class="chart-title">時期別ジャンル分布（月別）</div>';
        periodKeys.forEach(function(pk) {
          var entries = Object.entries(periodGenre[pk]).sort(function(a,b){return b[1]-a[1];});
          var pMax = entries.length ? entries[0][1] : 1;
          periodGenreHtml += '<div style="font-size:0.78rem;font-weight:700;color:var(--accent);margin:0.8rem 0 0.3rem;">' + pk + '</div>' + barChart(entries, pMax);
        });
        periodGenreHtml += '</div>';
      }

      // === 7. 時期別ジャンル評価分布 ===
      var periodGenreRating = {};
      done.forEach(function(b) {
        if (b.doneDate && b.genre && b.rating) {
          var q = b.doneDate.slice(0,7);
          var key = q + '/' + b.genre;
          if (!periodGenreRating[key]) periodGenreRating[key] = { sum:0, count:0, period:q, genre:b.genre };
          periodGenreRating[key].sum += b.rating;
          periodGenreRating[key].count++;
        }
      });
      var pgrKeys = Object.keys(periodGenreRating).sort();
      var pgrHtml = '';
      if (pgrKeys.length) {
        pgrHtml = '<div class="chart-card"><div class="chart-title">時期別ジャンル評価（月別）</div>';
        var currentPeriod = '';
        pgrKeys.forEach(function(k) {
          var d = periodGenreRating[k];
          var avg = Math.round(d.sum / d.count * 10) / 10;
          if (d.period !== currentPeriod) {
            currentPeriod = d.period;
            pgrHtml += '<div style="font-size:0.78rem;font-weight:700;color:var(--accent);margin:0.8rem 0 0.3rem;">' + d.period + '</div>';
          }
          var color = avg >= 4 ? 'background:linear-gradient(90deg,var(--green),#66BB6A)' : avg >= 3 ? '' : 'background:linear-gradient(90deg,var(--red),#EF5350)';
          pgrHtml += '<div class="bar-row"><div class="bar-label">' + d.genre + '</div><div class="bar-track"><div class="bar-fill" style="width:' + (avg/5*100) + '%;' + color + '"></div></div><div class="bar-val">' + avg + '</div></div>';
        });
        pgrHtml += '</div>';
      }

      // === 8. 著者ランキング ===
      var authorCount = {};
      books.forEach(function(b){if(b.author) authorCount[b.author]=(authorCount[b.author]||0)+1;});
      var authorSorted = Object.entries(authorCount).sort(function(a,b){return b[1]-a[1];}).slice(0,8);
      var authorMax = authorSorted.length ? authorSorted[0][1] : 1;
      var authorHtml = '<div class="chart-card"><div class="chart-title">著者ランキング</div>' + barChart(authorSorted, authorMax) + '</div>';

          '<button class="stats-tab" onclick="switchStatsTab(this,\'sp-genre\')">📚 ジャンル</button>' +
          '<button class="stats-tab" onclick="switchStatsTab(this,\'sp-author\')">✍ 著者</button>' +
        '</div>' +
        '<div class="stats-panel active" id="sp-timeline">' + monthHtml + renderGenreMonthHeatmap(done) + '</div>' +
        '<div class="stats-panel" id="sp-rating">' + ratingHtml + grHtml + pgrHtml + '</div>' +
        '<div class="stats-panel" id="sp-genre">' + genreHtml + periodGenreHtml + '</div>' +
        '<div class="stats-panel" id="sp-author">' + authorHtml + '</div>' +
        '</div>';
    }

        {t:'夜が明ける',a:'西加奈子',g:'社会派',aw:'本屋大賞2022ノミネート',y:2021,d:'2025-10-18',r:4},
        {t:'このミステリーがすごい',a:'宝島社',g:'ミステリー',aw:'',y:2024,d:'2026-02-18',r:3},

    var demoProfiles = [

      {id:'balance', name:'📚 バランス型読書家', desc:'幅広いジャンルを均等に', genres:{'ヒューマンドラマ':2,'ミステリー':2,'SF・ファンタジー':2,'青春':2,'恋愛':1,'歴史・時代':1,'お仕事':1,'社会派':1}, ratingBoost:{}},
    ];

    function loadDemo() {
      openModal('modal-demo');
    }

    function applyDemo(profileId) {
      var profile = demoProfiles.find(function(p){return p.id===profileId;});
      if (!profile) return;
      if (books.length > 0 && !confirm('既存データを上書きしますか？')) return;

      // Build weighted pool
      var pool = allDemoBooks.slice();
      // Also add bookDB entries not already in pool
      bookDB.forEach(function(d) {
        if (!pool.find(function(p){return p.t===d.t;})) {
          pool.push({t:d.t,a:d.a,g:d.g,aw:d.aw||'',y:d.y,d:'',r:3});
        }
      });

      // Score each book by profile preference
      pool.forEach(function(b) {
        b._score = (profile.genres[b.g] || 0.5) + Math.random() * 2;
      });
      pool.sort(function(a,b){return b._score - a._score;});

      // Pick top 100
      var picked = pool.slice(0, 100);

      // Assign dates spread over 16 months
      var startDate = new Date('2025-01-01');
      picked.forEach(function(b, i) {
        var d = new Date(startDate.getTime() + i * 4.8 * 24*60*60*1000); // ~5 days apart
        b.d = d.toISOString().slice(0,10);
      });

      // Assign ratings based on profile preference
      picked.forEach(function(b) {
        var base = 3;
        var boost = profile.ratingBoost[b.g] || 0;
        base += boost;
        base += (Math.random() - 0.3); // some randomness
        if (profile.yearBias && b.y) {
          if (b.y < 2005) base += 0.5; // classic bias
        }
        b.r = Math.max(1, Math.min(5, Math.round(base)));
      });

      books = picked.map(function(b, i) {
        return {
          id: (Date.now() + i).toString(), title: b.t, author: b.a, genre: b.g,
          award: b.aw||'', year: b.y, status: 'done', doneDate: b.d, rating: b.r,
          note: '', cover: '', synopsis: b.s||'',
        };
      });
      save(); closeModal('modal-demo'); renderBoard();
      alert(profile.name + ' のデモデータ ' + books.length + '冊を登録しました！');
    }

    // ===== INIT =====
    document.addEventListener('keydown', e => { if(e.key==='Escape') document.querySelectorAll('.modal-overlay.open').forEach(m=>m.classList.remove('open')); });
    // Render demo list
    var demoListEl = document.getElementById('demo-list');
    if (demoListEl) {
      demoListEl.innerHTML = demoProfiles.map(function(p) {
        return '<div style="background:var(--bg);border:1px solid var(--border);border-radius:0.5rem;padding:0.7rem;cursor:pointer;transition:border-color 0.15s;" onmouseover="this.style.borderColor=\'var(--accent)\'" onmouseout="this.style.borderColor=\'var(--border)\'" onclick="applyDemo(\'' + p.id + '\')">' +
          '<div style="font-size:0.88rem;font-weight:700;">' + p.name + '</div>' +
          '<div style="font-size:0.7rem;color:var(--text3);margin-top:0.2rem;">' + p.desc + '</div>' +
        '</div>';
      }).join('');
    }
    renderBoard();
  </script>
